name: ujobs_app
description: "UJob - Employer & Job Seeker App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP / API
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_secure_storage: ^9.0.0

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # File upload (resume)
  file_picker: ^8.0.3

  # WebView (Stripe payments)
  webview_flutter: ^4.4.4

  # Deep links
  app_links: ^6.1.1

  # Utils
  intl: ^0.20.2
  timeago: ^3.6.1
  shimmer: ^3.0.0

  # Firebase
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.1

  # Fonts
  google_fonts: ^8.1.0

  # In-app update checker
  upgrader: ^13.5.0

  # Responsive layout
  flutter_screenutil: ^5.9.3

  # Icons
  hugeicons: ^1.1.7
  flutter_svg: ^2.3.0

  # i18n
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
